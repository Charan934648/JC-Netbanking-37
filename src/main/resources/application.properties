# Server Settings
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/netbanking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=banking_user
spring.datasource.password=banking_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Security / JWT Configuration
# Hex encoded 256-bit signing key. Set JWT_SECRET_HEX outside source control.
app.jwt.secret-hex=${JWT_SECRET_HEX:}
app.jwt.expiration-ms=86400000

# OTP / Notification Settings
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.response-code-enabled=false
app.otp.delivery-provider=${OTP_DELIVERY_PROVIDER:console}
app.otp.email.from=${OTP_EMAIL_FROM:no-reply@jcbank.local}
app.otp.smtp.host=${OTP_SMTP_HOST:}
app.otp.smtp.port=${OTP_SMTP_PORT:587}
app.otp.smtp.username=${OTP_SMTP_USERNAME:}
app.otp.smtp.password=${OTP_SMTP_PASSWORD:}
app.otp.smtp.starttls=${OTP_SMTP_STARTTLS:true}

# Production-style default: no sample users. Set APP_BOOTSTRAP_SAMPLE_USERS=true only for local development.
app.bootstrap.sample-users=${APP_BOOTSTRAP_SAMPLE_USERS:false}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.user-password=${APP_BOOTSTRAP_USER_PASSWORD:}

# Beneficiary / Transfer Risk Controls
app.beneficiary.approval-delay-minutes=0
app.transfer.otp-threshold=200000
app.transfer.admin-approval-threshold=1000000
app.transfer.daily-limit=2000000
app.transfer.suspicious-threshold=750000

# Logging Configurations (to see Hibernate SQL and locks)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=INFO
