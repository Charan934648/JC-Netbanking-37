# Server Settings
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/netbanking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=banking_user
spring.datasource.password=banking_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Security / JWT Configuration
# Hex encoded 256-bit signing key. Set JWT_SECRET_HEX outside source control.
app.jwt.secret-hex=${JWT_SECRET_HEX:}
app.jwt.expiration-ms=86400000

# OTP / Notification Settings
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.demo-response-enabled=true
# Console is the default safe local delivery channel. Wire email/SMS providers with secrets outside source control.
app.otp.delivery-provider=console

# Beneficiary / Transfer Risk Controls
app.beneficiary.approval-delay-minutes=0
app.transfer.otp-threshold=200000
app.transfer.admin-approval-threshold=1000000
app.transfer.daily-limit=2000000
app.transfer.suspicious-threshold=750000

# Logging Configurations (to see Hibernate SQL and locks)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=INFO
